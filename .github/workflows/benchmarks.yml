name: Benchmark Regression Check

on:
  pull_request:
    branches: [master]

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Build benchcompare
        run: |
          cd tools/benchcompare
          go build -o ../../benchcompare .

      - name: Run benchmarks on PR branch
        run: |
          go test ./internal/bigmap/... -bench=. -benchmem -count=10 > new.txt

      - name: Run benchmarks on base branch
        run: |
          git checkout ${{ github.base_ref }}
          go test ./internal/bigmap/... -bench=. -benchmem -count=10 > old.txt

      - name: Compare
        id: compare
        run: |
          ./benchcompare old.txt new.txt > result.txt 2>&1 || true
          echo "output<<EOF" >> $GITHUB_OUTPUT
          cat result.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR comment
        uses: actions/github-script@v7
        env:
          BENCHMARK_REPORT: ${{ steps.compare.outputs.output }}
        with:
          script: |
            const report = process.env.BENCHMARK_REPORT;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Benchmark Results\n```\n' + report + '\n```'
            })