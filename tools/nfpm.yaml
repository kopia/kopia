# nfpm config for Kopia .deb and .rpm (replaces goreleaser nfpms section).
# Makefile invokes nfpm twice per arch: once for .deb with NFPM_ARCH=Debian arch (amd64/arm64/armhf),
# once for .rpm with NFPM_ARCH=RPM arch (x86_64/aarch64/armhfp), plus BINARY_DIR and KOPIA_VERSION_NO_PREFIX.
name: kopia
version: ${KOPIA_VERSION_NO_PREFIX}
arch: ${NFPM_ARCH}
platform: linux
maintainer: Kopia Project <kopia-pmc@googlegroups.com>
description: Fast and secure open source backup.
vendor: Kopia Project
homepage: https://kopia.io
license: Apache 2.0
contents:
  - src: ${BINARY_DIR}/kopia
    dst: /usr/bin/kopia
